<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Redes: IPv4 & Infraestrutura</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --pink: #ff79c6;
            --bg: #0a0a0c;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Efeito de fundo tecnológico */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
            z-index: -1;
        }

        h1 {
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px var(--cyan);
            margin-bottom: 40px;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            position: relative;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            color: white;
            border: 2px solid var(--cyan);
            border-radius: 8px;
            overflow: hidden;
            transition: 0.4s;
            background: transparent;
            cursor: pointer;
            text-align: center;
            min-width: 250px;
        }

        /* Cores Diferenciadas */
        .btn-intro { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .btn-master { border-color: var(--pink); box-shadow: 0 0 10px rgba(255, 121, 198, 0.2); }

        /* Efeitos de Hover */
        .btn-intro:hover {
            background: var(--cyan);
            color: black;
            box-shadow: 0 0 40px var(--cyan);
        }

        .btn-master:hover {
            background: var(--pink);
            color: white;
            box-shadow: 0 0 40px var(--pink);
            border-color: var(--pink);
        }

        .description {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #888;
            display: block;
            font-weight: normal;
            text-transform: none;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>Treinamento de Redes IPv4</h1>

    <div class="container">
        <a href="introducao.html" class="btn btn-intro">
            1. Introdução
            <span class="description">Conceitos básicos e Protocolos</span>
        </a>

        <a href="https://SEU-USUARIO.github.io/NOME-DO-REPOSITORIO/aula_master.html" class="btn btn-master">
            2. Aula Master
            <span class="description">Simulador 32 Bits e Classes</span>
        </a>
    </div>

    <div class="footer">ARQUITETURA DE REDES | MÓDULO 2026</div>

</body>
</html>
